<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Pokémon Battle</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <button id="battleBtn">INICIAR BATALHA</button>

  <!-- HUD 1 -->
  <div id="hud1">
    <img src="imgs/infernape.png" alt="Infernape" class="pokemon-image">

    <div id="player1">
      <div class="pokemon-name">INFERNAPE</div>
      <div class="hp-bar">
    <div id="hp1" class="hp-fill"></div> <!-- 👈 ADD ID -->
  </div>
    </div>
  </div>

  <!-- HUD 2 -->
  <div id="hud2">
    <img src="imgs/pikachu.png" alt="Pikachu" class="pokemon-image">

    <div id="player2">
      <div class="pokemon-name">PIKACHU</div>
      <div class="hp-bar">
    <div id="hp2" class="hp-fill"></div> <!-- 👈 ADD ID -->
  </div>
    </div>
  </div>

  <!-- UI de batalha -->
  <div id="battleUI">
    <div id="status"></div>
    <div id="battleLog">Aguardando comando...</div>
    <div id="moves"></div>
  </div>

  <!-- IMPORT MAP -->
  <script type="importmap">
    
  {
    "imports": {
      "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
